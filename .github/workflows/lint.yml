name: Lint and validate

on:
  pull_request:
  push:
    branches: [master]

jobs:
  ansible-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install ansible-lint
        run: pip install ansible-core ansible-lint
      # Profile 'min' — fails only on syntax errors and broken loads.
      # The 'basic'+ profiles enforce stylistic rules (var-naming, partial-become,
      # command-vs-shell) that need ~1-2h of refactoring to satisfy. Tighten
      # this when there's time for that pass.
      - name: Run ansible-lint
        run: ansible-lint ansible/playbook.yml --profile min
        working-directory: ${{ github.workspace }}

  ansible-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install ansible-core
      - name: Syntax check
        run: ansible-playbook -i ansible/inventory/local.ini ansible/playbook.yml --syntax-check

  packer-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-packer@main
      # Directory-mode validation: Packer auto-loads variables.pkr.hcl
      # alongside greymhatter.pkr.hcl from the same dir. Stub values come
      # from -var so required variables (no defaults) satisfy validation.
      - name: Validate Proxmox template
        working-directory: packer
        run: |
          packer init .
          packer validate \
            -var 'proxmox_url=https://example.invalid:8006/api2/json' \
            -var 'proxmox_node=stub' \
            -var 'proxmox_username=stub' \
            -var 'proxmox_token=stub' \
            -var 'proxmox_storage_pool=stub' \
            -var 'proxmox_iso_storage=stub' \
            -var 'proxmox_bridge=vmbr0' \
            -var 'proxmox_iso_file=stub:iso/Fedora.iso' \
            -var 'ssh_password=stub' \
            .
      # Fusion template's cd_files references ${path.root}/ks.cfg; the
      # Makefile copies it from packer/http/ before each build. Mirror that.
      - name: Validate Fusion template
        run: |
          cp packer/http/ks.cfg packer/fusion/ks.cfg
          cd packer/fusion
          packer init greymhatter-fusion.pkr.hcl
          packer validate greymhatter-fusion.pkr.hcl
          rm -f ks.cfg

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          set -e
          find tests scripts -type f -name '*.sh' -print0 | \
            xargs -0 -r shellcheck --severity=warning

  # Regression guard: block PRs that ADD new failure-masking patterns.
  # Grandfathers the existing 64+43 instances — counts only increase from new diff.
  masking-regression:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for new failure-masking patterns
        run: |
          set -e
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          # Find ADDED lines (start with '+', exclude '+++') matching forbidden patterns
          ADDED=$(git diff "$BASE".."$HEAD" -- 'ansible/**/*.yml' | \
                  grep -E '^\+[^+]' | \
                  grep -E '(failed_when:\s*false|^\+\s*changed_when:\s*true\s*$)' || true)
          if [ -n "$ADDED" ]; then
            echo "::error::New failure-masking patterns introduced. Each masked failure must include a follow-up assertion or use a narrower 'failed_when: result.rc not in [...]' condition."
            echo "$ADDED"
            exit 1
          fi
          echo "No new masking patterns introduced."
