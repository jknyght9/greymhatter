# Fedora Kickstart - GreymHatter DFIR Distribution
# Unattended install for Packer builds
# Works for both amd64 (BIOS) and arm64 (UEFI)

# System language and keyboard
lang en_US.UTF-8
keyboard us
timezone UTC

# Network
network --bootproto=dhcp --activate --onboot=yes

# Root and user accounts
rootpw --plaintext packer
user --name=hatter --password=H@tt3r123! --plaintext --groups=wheel

# Authentication
authselect select sssd with-silent-lastlog

# SELinux permissive (required for forensic tools)
selinux --permissive

# Firewall
firewall --enabled --ssh

# Boot loader
bootloader --append="net.ifnames=0 biosdevname=0"

# Disk partitioning - autopart then extend in %post
zerombr
clearpart --all --initlabel
autopart --type=lvm

# Package selection - Fedora Server minimal, we add everything via Ansible
%packages
@^server-product-environment
@standard
openssh-server
openssh-clients
qemu-guest-agent
open-vm-tools
python3
python3-pip
curl
wget
git
sudo
%end

# Post-install
%post --log=/root/ks-post.log

# Enable SSH + guest tooling. qemu-guest-agent serves Proxmox/Fusion;
# open-vm-tools (vmtoolsd) serves ESXi/Fusion. Only the relevant one
# actually starts on each hypervisor based on what virtualization
# devices are present.
systemctl enable sshd
systemctl enable qemu-guest-agent
systemctl enable vmtoolsd

# Allow password auth for Packer SSH provisioner
sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
sed -i 's/^#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config

# Ensure hatter can sudo without password (for Ansible)
echo "hatter ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/hatter
chmod 440 /etc/sudoers.d/hatter

# Set up SSH key auth for hatter (project key injected by Packer)
mkdir -p /home/hatter/.ssh
chmod 700 /home/hatter/.ssh
touch /home/hatter/.ssh/authorized_keys
chmod 600 /home/hatter/.ssh/authorized_keys
chown -R hatter:hatter /home/hatter/.ssh

# Extend root LV to use full disk (autopart only allocates ~15GB)
lvextend -l +100%FREE /dev/fedora/root || true
xfs_growfs / || true

# Install ansible-core for Packer ansible-local provisioner
dnf install -y ansible-core

%end

# Reboot after install
reboot
