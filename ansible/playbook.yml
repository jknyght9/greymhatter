---
- name: GreymHatter DFIR Distribution Setup
  hosts: localhost
  become: true
  gather_facts: true

  pre_tasks:
    - name: Display system info
      ansible.builtin.debug:
        msg: "Setting up GreymHatter on {{ ansible_architecture }} ({{ ansible_distribution }} {{ ansible_distribution_version }})"

    - name: Verify running on Fedora
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Fedora"
        fail_msg: "GreymHatter requires Fedora Linux. Detected: {{ ansible_distribution }}"

  roles:
    - role: base
      tags: [base]
    - role: docker
      tags: [docker]
    - role: desktop
      tags: [desktop]
    - role: user
      tags: [user]
    - role: tools
      tags: [tools]
    - role: containers
      tags: [containers]
    - role: courses
      tags: [courses]
    - role: samba
      tags: [samba]
    - role: verify
      tags: [verify]

  post_tasks:
    - name: Ensure desktop wallpaper is set (after user role copy)
      ansible.builtin.copy:
        dest: "/home/{{ greymhatter_username }}/.config/xfce4/xfconf/xfce-perchannel-xml/xfce4-desktop.xml"
        owner: "{{ greymhatter_username }}"
        group: "{{ greymhatter_username }}"
        mode: "0644"
        content: |
          <?xml version="1.1" encoding="UTF-8"?>
          <channel name="xfce4-desktop" version="1.0">
            <property name="backdrop" type="empty">
              <property name="screen0" type="empty">
                <property name="monitorVirtual-1" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="last-image" type="string" value="/home/{{ greymhatter_username }}/Pictures/background.png"/>
                    <property name="image-style" type="int" value="5"/>
                  </property>
                </property>
                <property name="monitorVirtual1" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="last-image" type="string" value="/home/{{ greymhatter_username }}/Pictures/background.png"/>
                    <property name="image-style" type="int" value="5"/>
                  </property>
                </property>
                <property name="monitor0" type="empty">
                  <property name="workspace0" type="empty">
                    <property name="last-image" type="string" value="/home/{{ greymhatter_username }}/Pictures/background.png"/>
                    <property name="image-style" type="int" value="5"/>
                  </property>
                </property>
              </property>
            </property>
            <property name="desktop-icons" type="empty">
              <property name="icon-size" type="uint" value="48"/>
              <property name="style" type="int" value="0"/>
            </property>
          </channel>
      tags: [desktop]
