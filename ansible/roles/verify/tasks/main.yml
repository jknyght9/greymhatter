---
# roles/verify — manifest-driven assertion of build end-state.
#
# Replaces the previous `which`-only verify with explicit assertions sourced
# from ansible/group_vars/manifest.yml. Failure of any sub-task aborts the
# playbook (and, in Packer, the build).
#
# Override `verify_deep: false` to skip the docker_startable phase (start/probe/down
# of Timesketch/Yeti/SpiderFoot) for fast inner-loop iteration.

- name: Create verify output directory
  ansible.builtin.file:
    path: /opt/greymhatter
    state: directory
    mode: "0755"

- name: Confirm Docker daemon is responsive (pre-flight)
  ansible.builtin.command: docker info --format '{% raw %}{{.ServerVersion}}{% endraw %}'
  register: verify_docker_info
  changed_when: false

- name: Assert Docker is functional
  ansible.builtin.assert:
    that:
      - verify_docker_info.rc == 0
      - verify_docker_info.stdout | length > 0
    fail_msg: "Docker daemon is not responsive — cannot run image/container verification."
    success_msg: "Docker {{ verify_docker_info.stdout }} responsive."

- name: Verify Docker images
  ansible.builtin.include_tasks: docker_images.yml

- name: Verify filesystem paths
  ansible.builtin.include_tasks: filesystem.yml

- name: Verify tool binaries
  ansible.builtin.include_tasks: tools_behavior.yml

- name: Verify systemd services
  ansible.builtin.include_tasks: services.yml

- name: Verify running containers
  ansible.builtin.include_tasks: docker_running.yml

- name: Verify startable services (deep check)
  ansible.builtin.include_tasks: docker_startable.yml
  when: verify_deep | default(true) | bool

- name: Emit verification manifest
  ansible.builtin.include_tasks: manifest_emit.yml
