---
# MaxMind GeoIP — always installed, credentials optional
# Students configure their own account in /opt/maxmind-geoipupdate/.env

- name: Check if MaxMind is already installed
  ansible.builtin.stat:
    path: /opt/maxmind-geoipupdate/compose.yml
  register: maxmind_installed

- name: Clone MaxMind GeoIP updater
  ansible.builtin.git:
    repo: https://github.com/jknyght9/maxmind-geoipupdate.git
    dest: /opt/maxmind-geoipupdate
    depth: 1
  when: not maxmind_installed.stat.exists

- name: Create GeoIP data directory
  ansible.builtin.file:
    path: /opt/maxmind-geoipupdate/geoip_data
    state: directory
    mode: "0755"

- name: Configure MaxMind credentials
  ansible.builtin.copy:
    dest: /opt/maxmind-geoipupdate/.env
    content: |
      GEOIPUPDATE_ACCOUNT_ID={{ maxmind_account_id }}
      GEOIPUPDATE_LICENSE_KEY={{ maxmind_license_key }}
    mode: "0600"
  when: maxmind_account_id | length > 0

# Intentionally NOT starting the container during build.
# MaxMind's free tier limits GeoLite2 downloads to 2000/day per license key
# — easy to exhaust across build iterations. The container is configured
# but left stopped. The deployed user runs `docker compose up -d` in
# /opt/maxmind-geoipupdate post-deploy when they want fresh geoip data.
