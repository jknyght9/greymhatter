---
- name: Check if Timesketch is already installed
  ansible.builtin.stat:
    path: /opt/timesketch/docker-compose.yml
  register: timesketch_installed

- name: Install Timesketch
  when: not timesketch_installed.stat.exists
  block:
    - name: Download Timesketch deployment script
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/contrib/deploy_timesketch.sh
        dest: /tmp/deploy_timesketch.sh
        mode: "0755"

    - name: Run Timesketch deployment script
      ansible.builtin.shell:
        cmd: bash /tmp/deploy_timesketch.sh
        chdir: /opt
      register: ts_deploy
      changed_when: ts_deploy.rc == 0
      # Google's deploy_timesketch.sh exits non-zero on success (it prints
      # "* Installation done." then returns 1, likely from a final cleanup
      # step). The next task — stat /opt/timesketch/docker-compose.yml — is
      # the real verification of install success; trust that over the rc.
      failed_when: false

    - name: Verify Timesketch was installed
      ansible.builtin.stat:
        path: /opt/timesketch/docker-compose.yml
      register: ts_verify
      failed_when: not ts_verify.stat.exists

    - name: Clean up deployment script
      ansible.builtin.file:
        path: /tmp/deploy_timesketch.sh
        state: absent

- name: Copy Timesketch overrides
  ansible.builtin.copy:
    src: "timesketch/{{ item }}"
    dest: "/opt/timesketch/{{ item }}"
    mode: "0644"
  loop:
    - docker-compose.override.yml
    - nginx.conf

- name: Copy Timesketch configuration files
  ansible.builtin.copy:
    src: "timesketch/{{ item }}"
    dest: "/opt/timesketch/etc/timesketch/{{ item }}"
    mode: "0644"
  loop:
    - tags.yaml
    - regex_features.yaml

- name: Copy timesketchrc to user home
  ansible.builtin.copy:
    src: timesketch/timesketchrc
    dest: "/home/{{ greymhatter_username }}/.timesketchrc"
    owner: "{{ greymhatter_username }}"
    group: "{{ greymhatter_username }}"
    mode: "0644"

# --- SSL certificates ---
- name: Create SSL directories
  ansible.builtin.file:
    path: "/opt/timesketch/ssl/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - certs
    - private

- name: Generate self-signed SSL certificate
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -days 3650 -newkey rsa:2048
      -keyout /opt/timesketch/ssl/private/nginx-selfsigned.key
      -out /opt/timesketch/ssl/certs/nginx-selfsigned.crt
      -subj "/CN=localhost"
      -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
    creates: /opt/timesketch/ssl/certs/nginx-selfsigned.crt

# --- Integrations (MaxMind, DFIQ) ---
- name: Check if MaxMind database exists
  ansible.builtin.stat:
    path: /opt/maxmind-geoipupdate/geoip_data/GeoLite2-City.mmdb
  register: maxmind_db

- name: Check if DFIQ is installed
  ansible.builtin.stat:
    path: /opt/dfiq
  register: dfiq_dir

- name: Configure Timesketch integrations
  ansible.builtin.blockinfile:
    path: /opt/timesketch/etc/timesketch/timesketch.conf
    marker: "# {mark} GREYMHATTER CONFIGURATION"
    block: |
      {% if maxmind_db.stat.exists | default(false) %}
      MAXMIND_DB_PATH = '/opt/maxmind/GeoLite2-City.mmdb'
      {% endif %}
      {% if dfiq_dir.stat.exists | default(false) %}
      DFIQ_ENABLED = True
      {% endif %}

# --- ARM64: build Timesketch image from source ---
# The official OSDFIR image is amd64-only; build natively on ARM64
- name: Build Timesketch Docker image for ARM64
  when: ansible_architecture == "aarch64"
  block:
    - name: Check if ARM64 Timesketch image exists
      ansible.builtin.shell:
        cmd: docker images -q greymhatter/timesketch:arm64
      register: ts_arm64_image
      changed_when: false

    - name: Create Timesketch build directory
      ansible.builtin.file:
        path: /tmp/timesketch-build
        state: directory
        mode: "0755"
      when: ts_arm64_image.stdout == ""

    - name: Download Timesketch Dockerfile
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/docker/release/build/Dockerfile-latest
        dest: /tmp/timesketch-build/Dockerfile
        mode: "0644"
      when: ts_arm64_image.stdout == ""

    - name: Download Timesketch entrypoint
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/google/timesketch/master/docker/release/build/docker-entrypoint.sh
        dest: /tmp/timesketch-build/docker-entrypoint.sh
        mode: "0755"
      when: ts_arm64_image.stdout == ""

    - name: Build Timesketch ARM64 image
      ansible.builtin.command:
        cmd: docker build -t greymhatter/timesketch:arm64 /tmp/timesketch-build/
      when: ts_arm64_image.stdout == ""
      register: ts_arm64_build
      changed_when: ts_arm64_build.rc == 0
      async: 600
      poll: 30

    - name: Assert ARM64 Timesketch image was built
      ansible.builtin.command: docker images -q greymhatter/timesketch:arm64
      register: ts_arm64_check
      changed_when: false
      failed_when: ts_arm64_check.stdout | length == 0
      when: ts_arm64_image.stdout == ""

    - name: Get Timesketch version from config.env
      ansible.builtin.shell:
        cmd: grep TIMESKETCH_VERSION /opt/timesketch/config.env | cut -d= -f2
      register: ts_version
      changed_when: false

    - name: Tag ARM64 image to match compose reference
      ansible.builtin.command:
        cmd: "docker tag greymhatter/timesketch:arm64 us-docker.pkg.dev/osdfir-registry/timesketch/timesketch:{{ ts_version.stdout }}"
      register: ts_arm64_tag
      changed_when: ts_arm64_tag.rc == 0

    - name: Clean up build directory
      ansible.builtin.file:
        path: /tmp/timesketch-build
        state: absent


# --- Initial setup ---
- name: Pull Timesketch container images (AMD64)
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env pull
    chdir: /opt/timesketch
  when: ansible_architecture != "aarch64"
  retries: 3
  delay: 10
  register: ts_pull
  until: ts_pull.rc == 0
  changed_when: ts_pull.stderr is search('(Pulling|Pulled|Downloaded)')

- name: Pull supporting container images (ARM64)
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env pull postgres redis opensearch nginx
    chdir: /opt/timesketch
  when: ansible_architecture == "aarch64"
  retries: 3
  delay: 10
  register: ts_pull_arm
  until: ts_pull_arm.rc == 0
  changed_when: ts_pull_arm.stderr is search('(Pulling|Pulled|Downloaded)')

- name: Start Timesketch
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env up -d --pull never
    chdir: /opt/timesketch
  register: ts_up
  changed_when: ts_up.stderr is search('(Created|Started|Recreated)')

- name: Wait for database schema initialization
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env exec -T postgres psql -U timesketch -d timesketch -c "\dt" 2>/dev/null | grep -q "user"
    chdir: /opt/timesketch
  register: ts_schema
  retries: 30
  delay: 5
  until: ts_schema.rc == 0
  changed_when: false
  # NO failed_when: false — if schema never initializes, fail the playbook.
  # Previously this was masked; the result was Timesketch shipping with no
  # tables and tests reporting PASS while the API returned 500s.

- name: Restart timesketch-web (workers race on first schema creation)
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env restart timesketch-web
    chdir: /opt/timesketch
  register: ts_restart
  changed_when: ts_restart.rc == 0

- name: Wait for Timesketch readiness (with auto-recovery)
  # Intermittent: sometimes the workers-race restart settles cleanly,
  # sometimes timesketch-web stays in a 502 loop. If the first 10-min wait
  # exhausts, do a full-stack restart and retry once more. Previously this
  # was masked with failed_when:false — silently shipping an OVA with no
  # hatter user when the wait timed out.
  block:
    - name: Wait for Timesketch to be ready
      ansible.builtin.uri:
        url: https://localhost/login
        validate_certs: false
        status_code: [200, 302]
      register: ts_ready
      retries: 60
      delay: 10
      until: ts_ready.status in [200, 302]
  rescue:
    - name: Recovery — full Timesketch stack restart
      ansible.builtin.shell:
        cmd: docker compose --env-file config.env restart
        chdir: /opt/timesketch
      register: ts_full_restart
      changed_when: ts_full_restart.rc == 0

    - name: Wait for Timesketch ready (after full restart)
      ansible.builtin.uri:
        url: https://localhost/login
        validate_certs: false
        status_code: [200, 302]
      register: ts_ready_retry
      retries: 60
      delay: 10
      until: ts_ready_retry.status in [200, 302]

- name: Check if Timesketch user exists
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env exec -T timesketch-web tsctl list-users 2>/dev/null | grep -q "{{ greymhatter_username }}"
    chdir: /opt/timesketch
  register: ts_user_check
  changed_when: false
  # Probe: rc=0 means user exists; rc=1 means absent (expected first run).
  failed_when: false

- name: Create Timesketch user
  ansible.builtin.shell:
    cmd: >-
      docker compose --env-file config.env exec -T timesketch-web
      tsctl create-user {{ greymhatter_username }}
      --password '{{ greymhatter_password }}'
    chdir: /opt/timesketch
  when: ts_user_check.rc != 0

- name: Install Timesketch importer
  ansible.builtin.pip:
    name: timesketch-import-client
    executable: pip3

- name: Stop Timesketch (starts manually via starttimesketch)
  ansible.builtin.shell:
    cmd: docker compose --env-file config.env down
    chdir: /opt/timesketch
  register: ts_down
  changed_when: ts_down.stderr is search('(Removed|Stopped|Removing|Stopping)')
