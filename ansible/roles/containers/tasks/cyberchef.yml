---
- name: Create CyberChef directory
  ansible.builtin.file:
    path: /opt/cyberchef
    state: directory
    mode: "0755"

- name: Copy CyberChef compose file
  ansible.builtin.copy:
    src: cyberchef/compose.yml
    dest: /opt/cyberchef/compose.yml
    mode: "0644"
  register: cyberchef_compose

- name: Start CyberChef
  ansible.builtin.shell:
    cmd: docker compose up -d
    chdir: /opt/cyberchef
  register: cyberchef_up
  changed_when: cyberchef_up.stderr is search('(Created|Started|Recreated|Pulling)')

- name: Verify CyberChef container is running
  ansible.builtin.command:
    cmd: docker compose ps --status running --quiet
    chdir: /opt/cyberchef
  register: cyberchef_running
  changed_when: false
  failed_when: cyberchef_running.stdout | length == 0
