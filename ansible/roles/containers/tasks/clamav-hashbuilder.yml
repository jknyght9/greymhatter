---
# clamav-hashbuilder — builds Autopsy hashsets from ClamAV signatures
# https://github.com/jknyght9/clamav-hashbuilder
# Runs continuously, updating every 24 hours (HASHBUILDER_FREQUENCY)
# Manual refresh: update-hashsets (fish helper)
# Output: /opt/hashsets

- name: Check if clamav-hashbuilder is installed
  ansible.builtin.stat:
    path: /opt/clamav-hashbuilder/compose.yml
  register: hashbuilder_check

- name: Install clamav-hashbuilder
  when: not hashbuilder_check.stat.exists
  block:
    - name: Create hashsets directory
      ansible.builtin.file:
        path: /opt/hashsets
        state: directory
        owner: "{{ greymhatter_username }}"
        group: "{{ greymhatter_username }}"
        mode: "0755"

    - name: Clone clamav-hashbuilder
      ansible.builtin.git:
        repo: https://github.com/jknyght9/clamav-hashbuilder.git
        dest: /opt/clamav-hashbuilder
        depth: 1

    - name: Symlink hashsets directory into repo
      ansible.builtin.file:
        src: /opt/hashsets
        dest: /opt/clamav-hashbuilder/hashsets
        state: link

    - name: Build clamav-hashbuilder image
      ansible.builtin.shell:
        cmd: docker compose build
        chdir: /opt/clamav-hashbuilder
      register: hashbuilder_build
      changed_when: hashbuilder_build.rc == 0
      retries: 3
      delay: 10
      until: hashbuilder_build.rc == 0

    - name: Start clamav-hashbuilder
      ansible.builtin.shell:
        cmd: docker compose up -d
        chdir: /opt/clamav-hashbuilder
      register: hashbuilder_up
      changed_when: hashbuilder_up.stderr is search('(Created|Started|Recreated|Pulling)')

    - name: Verify clamav-hashbuilder container is running
      ansible.builtin.command:
        cmd: docker compose ps --status running --quiet
        chdir: /opt/clamav-hashbuilder
      register: hashbuilder_running
      changed_when: false
      failed_when: hashbuilder_running.stdout | length == 0
