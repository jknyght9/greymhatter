---
- name: Create Homepage directory
  ansible.builtin.file:
    path: /opt/homepage
    state: directory
    mode: "0755"

- name: Copy Homepage files
  ansible.builtin.copy:
    src: homepage/
    dest: /opt/homepage/
    mode: preserve
    directory_mode: "0755"
  register: homepage_files

- name: Start Homepage
  ansible.builtin.shell:
    cmd: docker compose up -d
    chdir: /opt/homepage
  register: homepage_up
  changed_when: homepage_up.stderr is search('(Created|Started|Recreated|Pulling)')

- name: Verify Homepage container is running
  ansible.builtin.command:
    cmd: docker compose ps --status running --quiet
    chdir: /opt/homepage
  register: homepage_running
  changed_when: false
  failed_when: homepage_running.stdout | length == 0
