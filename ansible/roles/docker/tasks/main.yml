---
# roles/docker - Docker CE installation and configuration

- name: Remove old Docker packages
  ansible.builtin.dnf:
    name:
      - docker
      - docker-client
      - docker-client-latest
      - docker-common
      - docker-latest
      - docker-latest-logrotate
      - docker-logrotate
      - docker-engine
    state: absent
  register: docker_old_remove
  # dnf returns nonzero if NONE of the packages are present (clean Fedora
  # has none of these legacy names). Treat that as success.
  failed_when:
    - docker_old_remove is failed
    - "'No package' not in (docker_old_remove.msg | default(''))"
    - "'matching' not in (docker_old_remove.msg | default(''))"

- name: Create Docker config directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"

- name: Configure Docker daemon (before installation so it's in place at first start)
  ansible.builtin.template:
    src: daemon.json.j2
    dest: /etc/docker/daemon.json
    mode: "0644"

- name: Install Docker via get.docker.com
  ansible.builtin.shell:
    cmd: curl -fsSL https://get.docker.com | sh
    creates: /usr/bin/docker

- name: Enable and start Docker (with daemon.json already in place)
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
    daemon_reload: true

- name: Verify Docker is running
  ansible.builtin.command: docker --version
  changed_when: false
  register: docker_version

# Authenticate to Docker Hub (optional but recommended).
# Anonymous pulls are rate-limited to 100/6h per IP — easy to exhaust on
# build iteration. Authenticated free-tier accounts get 200/6h per account.
# Skips silently if credentials are not provided.
- name: Authenticate to Docker Hub
  ansible.builtin.command:
    cmd: "docker login -u {{ docker_hub_username }} --password-stdin"
    stdin: "{{ docker_hub_token }}"
  when:
    - docker_hub_username | default('') | length > 0
    - docker_hub_token | default('') | length > 0
  register: docker_hub_login
  changed_when: "'Login Succeeded' in docker_hub_login.stdout"
  no_log: true

- name: Display Docker version
  ansible.builtin.debug:
    msg: "{{ docker_version.stdout }}"

- name: Verify Docker Compose is available
  ansible.builtin.command: docker compose version
  changed_when: false
  register: compose_version

- name: Display Docker Compose version
  ansible.builtin.debug:
    msg: "{{ compose_version.stdout }}"

- name: Check if Docker network exists
  ansible.builtin.command:
    cmd: "docker network inspect {{ docker_network_name }}"
  register: network_check
  changed_when: false
  # Probe: rc=0 means network exists; rc=1 means absent (expected first run).
  failed_when: false

- name: Create shared Docker network
  ansible.builtin.command:
    cmd: "docker network create {{ docker_network_name }}"
  when: network_check.rc != 0
