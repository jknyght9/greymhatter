---
# roles/samba - SMB/Samba network share

- name: Create share directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ greymhatter_username }}"
    mode: "0775"
  loop:
    - "{{ share_dir }}"
    - "{{ share_dir }}/kape"
    - "{{ share_dir }}/hayabusa"
    - "{{ share_dir }}/images"
    - "{{ share_dir }}/plaso"

- name: Install Samba
  ansible.builtin.dnf:
    name:
      - samba
      - samba-common
    state: present

- name: Enable Samba services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - smb
    - nmb

- name: Check if Samba firewall rule exists
  ansible.builtin.command:
    cmd: firewall-cmd --query-service=samba --permanent
  register: fw_samba
  changed_when: false
  # Probe: rc=0 means rule present; rc!=0 means absent (expected first run).
  failed_when: false

- name: Open firewall for Samba
  ansible.builtin.command:
    cmd: firewall-cmd --permanent --add-service=samba
  when: fw_samba.rc != 0
  register: fw_samba_add
  changed_when: "'success' in fw_samba_add.stdout"
  notify: Restart Samba

- name: Reload firewall
  ansible.builtin.command:
    cmd: firewall-cmd --reload
  when: fw_samba.rc != 0
  register: fw_samba_reload
  changed_when: fw_samba_reload.rc == 0

- name: Create samba group
  ansible.builtin.group:
    name: samba
    state: present

- name: Add user to samba group
  ansible.builtin.user:
    name: "{{ greymhatter_username }}"
    groups: samba
    append: true

- name: Set SELinux context for share directory
  ansible.builtin.command:
    cmd: "chcon -t samba_share_t {{ share_dir }} -R"
  register: chcon_share
  # chcon returns rc=1 if SELinux is disabled — that's fine on Fedora when
  # the user has set it to disabled (we set permissive in base/, but a user
  # may have hardened further). Real chcon errors (path missing) still surface.
  changed_when: chcon_share.rc == 0
  failed_when:
    - chcon_share.rc != 0
    - "'SELinux is disabled' not in (chcon_share.stderr | default(''))"

- name: Set SELinux fcontext for share directory
  ansible.builtin.command:
    cmd: "semanage fcontext -a -t samba_share_t '{{ share_dir }}(/.*)?'"
  register: semanage_share
  changed_when: semanage_share.rc == 0
  # semanage returns nonzero if rule already exists — that's idempotent and fine.
  failed_when:
    - semanage_share.rc != 0
    - "'already defined' not in (semanage_share.stderr | default(''))"
    - "'SELinux is disabled' not in (semanage_share.stderr | default(''))"

- name: Check if Samba user exists
  ansible.builtin.command:
    cmd: "pdbedit -L -u {{ greymhatter_username }}"
  register: smb_user_check
  changed_when: false
  # Probe: rc=0 means user exists; rc!=0 means absent (expected first run).
  failed_when: false

- name: Set Samba password
  ansible.builtin.shell:
    cmd: "printf '{{ greymhatter_password }}\n{{ greymhatter_password }}\n' | smbpasswd -s -a {{ greymhatter_username }}"
  when: smb_user_check.rc != 0
  no_log: true

- name: Configure Samba share
  ansible.builtin.copy:
    dest: /etc/samba/smb.conf
    mode: "0644"
    content: |
      [global]
      workgroup = WORKGROUP
      server string = GreymHatter
      security = user
      map to guest = Bad User

      [share]
      path = {{ share_dir }}
      browseable = yes
      writable = yes
      valid users = @samba
      force group = samba
      create mask = 0775
      directory mask = 0775
  notify: Restart Samba
