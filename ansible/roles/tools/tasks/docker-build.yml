---
# Docker-based compilation of tools from source
# Builds sleuthkit, bulk_extractor, libbde, libfvde inside a container
# then extracts the binaries to the host. Keeps the host clean.

- name: Check if compiled tools already exist
  ansible.builtin.command: which fls
  register: compiled_tools_check
  changed_when: false
  # Probe: rc=0 means already installed; rc=1 means we need to build (expected first run).
  failed_when: false

- name: Build tools from source in Docker
  when: compiled_tools_check.rc != 0
  block:
    - name: Copy Dockerfile.builder to build location
      ansible.builtin.copy:
        src: "{{ greymhatter_repo_path }}/ansible/roles/tools/files/Dockerfile.builder"
        dest: /tmp/Dockerfile.builder
        mode: "0644"

    - name: Build tools container (this takes several minutes)
      ansible.builtin.command:
        cmd: docker build --network=host -f /tmp/Dockerfile.builder -t greymhatter-builder /tmp
      register: builder_build
      changed_when: builder_build.rc == 0
      async: 1800
      poll: 30

    - name: Assert builder image was created
      ansible.builtin.command: docker images -q greymhatter-builder
      register: builder_image_check
      changed_when: false
      failed_when: builder_image_check.stdout | length == 0

    - name: Create temporary container for binary extraction
      ansible.builtin.command:
        cmd: docker create --name greymhatter-builder-extract greymhatter-builder
      register: builder_create
      changed_when: builder_create.rc == 0

    - name: Extract compiled binaries
      ansible.builtin.command:
        cmd: docker cp greymhatter-builder-extract:/output/ /tmp/tool-binaries/
      register: builder_extract
      changed_when: builder_extract.rc == 0

    - name: Assert extracted binaries exist on host
      ansible.builtin.stat:
        path: /tmp/tool-binaries
      register: extract_check
      failed_when: not extract_check.stat.exists or not extract_check.stat.isdir

    # --- Install each tool's binaries ---

    - name: Install compiled binaries from each subtree
      ansible.builtin.shell:
        cmd: "cp -r /tmp/tool-binaries/{{ item }}/usr/local/* /usr/local/"
      register: install_result
      changed_when: install_result.rc == 0
      loop:
        - libvmdk
        - libvhdi
        - sleuthkit
        - bulk_extractor
        - libbde
        - libfvde

    - name: Update shared library cache
      ansible.builtin.command: ldconfig
      register: ldconfig_result
      changed_when: ldconfig_result.rc == 0

    # --- Cleanup ---

    - name: Remove builder container
      ansible.builtin.command:
        cmd: docker rm greymhatter-builder-extract
      register: builder_rm
      changed_when: builder_rm.rc == 0
      # Idempotent cleanup — container may not exist on partial rerun.
      failed_when: false

    - name: Remove builder image
      ansible.builtin.command:
        cmd: docker rmi greymhatter-builder
      register: builder_rmi
      changed_when: builder_rmi.rc == 0
      # Idempotent cleanup — image may not exist on partial rerun.
      failed_when: false

    - name: Clean up build artifacts
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/Dockerfile.builder
        - /tmp/tool-binaries

    # --- Verify ---

    - name: Verify compiled tools run
      ansible.builtin.command:
        cmd: "{{ item }}"
      changed_when: false
      loop:
        - fls -V
        - bulk_extractor -V
        - bdemount -V
        - fvdemount -V
