site_name: GreymHatter
site_url: https://jknyght9.github.io/greymhatter
site_author: Jacob Stauffer | CISSP, GCFA, GREM, OSCP
site_description: A DFIR distribution based on Fedora Linux for teaching and casework

repo_name: jknyght9/greymhatter
repo_url: https://github.com/jknyght9/greymhatter

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Accessing the Samba Share: getting-started/samba.md
    - Firewall: getting-started/firewall.md
  - Tools:
    - Overview: tools/overview.md
    - Shell Functions: tools/shell-functions.md
  - Configuration:
    - Credentials & Paths: configuration/credentials.md
    - Desktop Environment: configuration/desktop.md
  - Development:
    - Build Pipeline: development/build-pipeline.md
    - Adding Tools: development/adding-tools.md
    - Testing: development/testing.md
  - Reference:
    - Software: reference/software.md
    - Changelog: reference/changelog.md
